apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mi-webapp
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Chistopher2321/mi-webapp.git
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
