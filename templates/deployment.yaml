apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Release.Name }}-webapp

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: webapp

  template:
    metadata:
      labels:
        app: webapp

    spec:
      containers:
      - name: nginx
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        ports:
        - containerPort: 80
